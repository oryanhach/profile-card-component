<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="./images/favicon-32x32.png"
		/>
		<link rel="stylesheet" href="styles.css" />

		<title>Frontend Mentor | Profile card component</title>
	</head>
	<body>
		<main class="profile">
			<header class="profile__header"></header>
			<section class="profile__middle">
				<div class="profile__pic-container">
					<img
						class="profile__pic"
						src="images/image-victor.jpg"
						alt="victor-profile-picture"
					/>
				</div>
				<div class="profile__details">
					<div class="profile__details-main">
						<p class="profile__name">Victor Crest</p>
						<p class="profile__age">26</p>
					</div>
					<p class="profile__city">London</p>
				</div>
			</section>

			<hr />
			<footer class="profile__stats">
				<div class="profile__stats-item">
					<p class="profile__stats-number">80K</p>
					<p class="profile__stats-label">Followers</p>
				</div>
				<div class="profile__stats-item">
					<p class="profile__stats-number">803K</p>
					<p class="profile__stats-label">Likes</p>
				</div>
				<div class="profile__stats-item">
					<p class="profile__stats-number">1.4K</p>
					<p class="profile__stats-label">Photos</p>
				</div>
			</footer>
		</main>
	</body>
</html>
